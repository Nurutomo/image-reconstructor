<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Reconstructor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🎨 Image Reconstructor</h1>
    <p>Select an image, apply canvas manipulations, and compare before &amp; after.</p>
  </header>

  <main>
    <!-- Upload Section -->
    <section class="upload-section">
      <label class="upload-label" for="imageInput">
        <span class="upload-icon">📁</span>
        <span id="uploadText">Click or drag &amp; drop an image here</span>
        <input type="file" id="imageInput" accept="image/*" />
      </label>
    </section>

    <!-- Controls Section -->
    <section class="controls-section" id="controlsSection" hidden>
      <div class="controls-grid">
        <div class="control-group">
          <label for="rotationRange">Rotation <span id="rotationVal">0</span>°</label>
          <input type="range" id="rotationRange" min="-180" max="180" value="0" />
        </div>

        <div class="control-group">
          <label for="gradeRange">1D Grade <span id="gradeVal">0</span></label>
          <input type="range" id="gradeRange" min="-100" max="100" value="0" />
        </div>

      </div>
    </section>

    <!-- Before / After Section -->
    <section class="canvas-section" id="canvasSection" hidden>
      <div class="canvas-container">
        <div class="canvas-wrapper">
          <h2>Before</h2>
          <canvas id="beforeCanvas"></canvas>
        </div>

        <div class="canvas-wrapper">
          <h2>Rotation</h2>
          <canvas id="rotateCanvas"></canvas>
        </div>

        <div class="canvas-wrapper">
          <h2>1D Grade</h2>
          <canvas id="gradeCanvas"></canvas>
        </div>

        <div class="canvas-wrapper">
          <h2>Final</h2>
          <canvas id="afterCanvas"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
